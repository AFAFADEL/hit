apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: carts-db
  namespace: sock-shop
  labels:
    app: carts-db
spec:
  serviceName: carts-db
  replicas: 1
  selector:
    matchLabels:
      app: carts-db
  template:
    metadata:
      labels:
        app: carts-db
    spec:
      containers:
        - name: carts-db
          image: mongo:3.6
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: carts-db-storage
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: carts-db-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
