apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_label_kubernetes_io_hostname]
            target_label: kubernetes_io_hostname
          - source_labels: [__meta_kubernetes_node_name]
            target_label: instance
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
      - job_name: kubernetes-service-endpoints
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
            action: replace
            target_label: __scheme__
            regex: (.+)
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
  alert.rules: |
    groups:
      - name: node-alerts
        rules:
          - alert: NodeCpuHigh
            expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node CPU usage is high"
              description: "Node {{ $labels.instance }} CPU usage is above 80% for 5 minutes."
          - alert: NodeMemoryHigh
            expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 20
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node memory available is low"
              description: "Node {{ $labels.instance }} memory available is below 20%."
      - name: pod-alerts
        rules:
          - alert: PodRestartHigh
            expr: increase(kube_pod_container_status_restarts_total[30m]) > 3
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod restart count is high"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 3 times in 30m."
          - alert: PodCpuHigh
            expr: sum by(namespace, pod) (rate(container_cpu_usage_seconds_total[5m])) > 0.2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod CPU usage is high"
              description: "Pod {{ $labels.pod }} CPU usage exceeds 0.2 cores."
