apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orders-db-policy
  namespace: habiba-dev
spec:
  podSelector:
    matchLabels:
      app: orders-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: orders
      ports:
        - protocol: TCP
          port: 27017
