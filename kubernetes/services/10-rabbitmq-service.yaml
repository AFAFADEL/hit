apiVersion: v1
kind: Service

metadata:
  name: rabbitmq
  namespace: habiba-dev
  labels:
    app: rabbitmq

spec:
  type: ClusterIP

  selector:
    app: rabbitmq

  ports:
    - name: amqp
      port: 5672
      targetPort: 5672

    - name: epmd
      port: 4369
      targetPort: 4369

    - name: clustering
      port: 25672
      targetPort: 25672
