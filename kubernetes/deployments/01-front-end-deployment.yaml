apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-end
  namespace: habiba-dev
  labels:
    app: front-end

spec:
  replicas: 1

  selector:
    matchLabels:
      app: front-end

  template:
    metadata:
      labels:
        app: front-end

    spec:
      containers:
        - name: front-end
          image: weaveworksdemos/front-end:0.3.12

          ports:
            - containerPort: 8079

          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false

            capabilities:
              drop:
                - ALL