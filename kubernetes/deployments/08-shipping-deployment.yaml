apiVersion: apps/v1
kind: Deployment

metadata:
  name: shipping
  namespace: habiba-dev

  labels:
    app: shipping

spec:
  replicas: 1

  selector:
    matchLabels:
      app: shipping

  template:
    metadata:
      labels:
        app: shipping

    spec:
      containers:
        - name: shipping

          image: weaveworksdemos/shipping:0.4.8

          ports:
            - containerPort: 80

          env:
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx128m"

          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp

          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false

            capabilities:
              drop:
                - ALL

              add:
                - NET_BIND_SERVICE

      volumes:
        - name: tmp-volume
          emptyDir: {}
