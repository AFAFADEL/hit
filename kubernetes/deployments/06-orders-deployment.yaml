apiVersion: apps/v1
kind: Deployment

metadata:
  name: orders
  namespace: habiba-dev
  labels:
    app: orders

spec:
  replicas: 1

  selector:
    matchLabels:
      app: orders

  template:
    metadata:
      labels:
        app: orders

    spec:
      containers:
        - name: orders
          image: weaveworksdemos/orders:0.4.7

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"

          env:
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JAVA_OPTS

          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp

          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

      volumes:
        - name: tmp-volume
          emptyDir: {}