apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalogue
  namespace: habiba-dev

  labels:
    app: catalogue

spec:
  replicas: 1

  selector:
    matchLabels:
      app: catalogue

  template:
    metadata:
      labels:
        app: catalogue

    spec:
      containers:
        - name: catalogue

          image: weaveworksdemos/catalogue:0.3.5

          ports:
            - containerPort: 80

          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false

            capabilities:
              drop:
                - ALL

              add:
                - NET_BIND_SERVICE