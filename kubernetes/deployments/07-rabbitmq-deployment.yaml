apiVersion: apps/v1
kind: Deployment

metadata:
  name: rabbitmq
  namespace: habiba-dev
  labels:
    app: rabbitmq

spec:
  replicas: 1

  selector:
    matchLabels:
      app: rabbitmq

  template:
    metadata:
      labels:
        app: rabbitmq

    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.6.8

          ports:
            - containerPort: 5672
            - containerPort: 4369
            - containerPort: 25672

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false