apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-agent
  namespace: sock-shop
  labels:
    app: log-agent

spec:
  selector:
    matchLabels:
      app: log-agent

  template:
    metadata:
      labels:
        app: log-agent

    spec:
      containers:
        - name: log-agent
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Log agent started on node: $NODE_NAME"
              while true; do
                echo "Collecting logs from /var/log ..."
                sleep 30
              done

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true

          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      volumes:
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
